<!--
  K-Aqua Element: ProgressIndicator
  Segment 11 · FX · UI & Spezial
  KI-Notiz: Minimaler Fortschritts-Kopf für kurze Strecken: drei Spring-Dots + füllende Linie, gesteuert über Zurück/Weiter — das reduzierte Gegenstück zum Stepper (ohne Panels).
  Voraussetzung: kaqua-elemente.css + kaqua-elemente.js sind global eingebunden.
  Dieses Markup ist beliebig oft und auf beliebig vielen Seiten wiederverwendbar.
-->
<!-- SNIPPET: progressindicator -->
<div class="ka-progress">
  <div class="ka-progress-line"><span class="dot"></span><span class="dot"></span><span class="dot"></span><i class="fill"></i></div>
  <p class="ka-progress-label">Schritt <b class="num">1</b> von 3</p>
  <div class="ka-progress-nav">
    <button class="prev" type="button">Zurück</button>
    <button class="next" type="button">Weiter</button>
  </div>
</div>
<!-- /SNIPPET: progressindicator -->
