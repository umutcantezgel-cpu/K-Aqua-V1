<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-Aqua — Pipe FX Katalog</title>
  <link rel="stylesheet" href="kaqua-tokens.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: var(--background); color: var(--foreground); font-family: var(--font-body); }
    header.cat { max-width: 880px; margin: 0 auto; padding: 88px 24px 16px; text-align: center; }
    header.cat h1 { font-family: var(--font-heading); font-weight: 800; font-size: clamp(30px, 4.5vw, 46px); letter-spacing: -0.02em; margin: 0 0 12px; }
    header.cat p { color: var(--muted-foreground); font-size: 17px; margin: 0; }
    .grid { max-width: 1180px; margin: 32px auto 96px; padding: 0 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 24px; }
    .cell { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-diffuse); padding: 28px 20px 20px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .cell .tag { font-family: var(--font-heading); font-weight: 700; font-size: 12.5px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--primary); background: var(--primary-soft); border-radius: var(--radius-full); padding: 7px 16px; }
    .cell .sub { color: var(--muted-foreground); font-size: 13.5px; text-align: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="kaqua-globe-engine.js"></script>
  <script type="text/babel" src="kaqua-pipefx.jsx"></script>
  <script type="text/babel">
    const DEMOS = [
      ['flow', 'Pipe Flow — laminare Strömung, Geschwindigkeitsprofil', 'Produkte, Lösungen'],
      ['droplet', 'Tropfen-Impact — Fall + Ringwellen', 'Hero, Sektionstrenner'],
      ['reservoir', 'Reservoir — Füllstand mit Wellen & Blasen (progress-fähig)', 'RFQ-Fortschritt'],
      ['extruder', 'Extruder-Linie — Rohr wächst aus der Düse', 'Über uns / Produktion'],
      ['blueprint', 'Blaupausen-Zeichner — Querschnitt zeichnet sich selbst', 'Produktfinder-Detail'],
      ['scan', 'Qualitäts-Scan — Messlaser + Prüf-Ticks', 'Trust Center'],
      ['pressure', 'Druckring-Puls — Druckwellen um den Querschnitt', 'Finder-Detailpanel'],
      ['isonet', 'Leitungsnetz — isometrischer Aufbau Segment für Segment', 'Referenzen / Infrastruktur'],
    ];
    function Catalog() {
      return (
        <React.Fragment>
          <header className="cat">
            <h1>Pipe FX Katalog</h1>
            <p>8 firmenspezifische Canvas-Animationen — Wasser, Material, Produktion, Präzision. Textfrei, hell, Token-Farben.</p>
          </header>
          <div className="grid">
            {DEMOS.map(([variant, note, place]) => (
              <div className="cell" key={variant} data-screen-label={`PipeFX: ${variant}`}>
                <span className="tag">{variant}</span>
                <PipeFX variant={variant} size={330} />
                <span className="sub">{note}<br />Einsatz: {place}</span>
              </div>
            ))}
          </div>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Catalog />);
  </script>
</body>
</html>
