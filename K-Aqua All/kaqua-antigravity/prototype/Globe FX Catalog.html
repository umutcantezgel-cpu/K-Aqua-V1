<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-Aqua — Globus Scroll-FX Katalog</title>
  <link rel="stylesheet" href="kaqua-tokens.css" />
  <link rel="stylesheet" href="kaqua-globe-variants.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: var(--background); color: var(--foreground); font-family: var(--font-body); }
    header.cat { max-width: 880px; margin: 0 auto; padding: 96px 24px 24px; text-align: center; }
    header.cat h1 { font-family: var(--font-heading); font-weight: 800; font-size: clamp(30px, 4.5vw, 48px); letter-spacing: -0.02em; margin: 0 0 12px; }
    header.cat p { color: var(--muted-foreground); font-size: 17px; margin: 0; }
    section.demo { min-height: 78vh; display: grid; place-items: center; align-content: center; gap: 8px; border-top: 1px solid var(--card-border); }
    section.demo .tag {
      font-family: var(--font-heading); font-weight: 700; font-size: 13px; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--primary);
      background: var(--primary-soft); border-radius: var(--radius-full); padding: 8px 18px;
    }
    section.demo .sub { color: var(--muted-foreground); font-size: 14px; }
    footer.cat { text-align: center; padding: 48px 24px 96px; color: var(--muted-foreground); font-size: 14px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="kaqua-globe-engine.js"></script>
  <script type="text/babel" src="kaqua-globe-variants.jsx"></script>
  <script type="text/babel" src="kaqua-globe-scrollfx.jsx"></script>
  <script type="text/babel">
    const DEMOS = [
      ['horizon', 'blueprint', 'Horizont-Reveal — steigt aus der Horizontlinie'],
      ['rise', 'fluid', 'Rise — hebt sich mit dem Scroll an'],
      ['zoom', 'matrix', 'Zoom — wächst in die Szene'],
      ['spin', 'contour', 'Spin — Rotation an Scrollposition gekoppelt'],
      ['parallax', 'network', 'Parallax — schwebt langsamer als die Seite'],
      ['driftL', 'blueprint', 'Drift L — zieht von links ein'],
      ['driftR', 'fluid', 'Drift R — zieht von rechts ein'],
      ['tilt', 'matrix', 'Tilt — 3D-Kippung beim Durchscrollen'],
      ['sway', 'contour', 'Sway — pendelt sanft durch die Sektion'],
      ['blurIn', 'network', 'Blur-In — schärft sich beim Eintritt'],
      ['orbit', 'blueprint', 'Orbit — beschreibt eine Bogenbahn'],
      ['pulse', 'fluid', 'Pulse — atmet in der Sektionsmitte'],
    ];
    function Catalog() {
      return (
        <React.Fragment>
          <header className="cat">
            <h1>Globus Scroll-FX Katalog</h1>
            <p>12 Scroll-Animationen × 5 Globus-Varianten = 60 einsetzbare Kombinationen. Einfach scrollen.</p>
          </header>
          {DEMOS.map(([fx, variant, note]) => (
            <section className="demo" key={fx} data-screen-label={`FX: ${fx}`}>
              <span className="tag">{fx} · {variant}</span>
              <GlobeScrollFX fx={fx} variant={variant} size={320} />
              <span className="sub">{note}</span>
            </section>
          ))}
          <footer className="cat">Einsatz im Code: &lt;GlobeScrollFX fx="…" variant="…" size=&#123;300&#125; /&gt;</footer>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Catalog />);
  </script>
</body>
</html>
