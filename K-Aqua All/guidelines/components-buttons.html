<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="UTF-8" />
<title>K-Aqua — Buttons & Chips</title>
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 28px; }
  .wrap { display: flex; flex-direction: column; gap: 24px; max-width: 880px; }
  h2 { font-family: var(--font-heading); font-size: 15px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted-foreground); margin-bottom: 12px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .dark-strip { background: var(--inverse-surface); border-radius: 16px; padding: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <div>
    <h2>Buttons — primary / ghost / inverse · sm 44 / md 48 / lg 56</h2>
    <div class="row" style="margin-bottom:12px">
      <button class="k-btn k-btn--primary k-btn--lg">Produktsystem entdecken
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"></path></svg>
      </button>
      <button class="k-btn k-btn--primary">Jetzt filtern</button>
      <button class="k-btn k-btn--primary k-btn--sm">Katalog (PDF)</button>
      <button class="k-btn k-btn--primary" disabled>Deaktiviert</button>
    </div>
    <div class="row" style="margin-bottom:12px">
      <button class="k-btn k-btn--ghost k-btn--lg">Kontakt aufnehmen</button>
      <button class="k-btn k-btn--ghost">Downloads &amp; Service</button>
      <button class="k-btn k-btn--ghost k-btn--sm">Nochmal</button>
    </div>
    <div class="dark-strip row">
      <button class="k-btn k-btn--inverse k-btn--lg">Jetzt Kontakt aufnehmen</button>
      <button class="k-btn k-btn--inverse">Projekt anfragen</button>
    </div>
  </div>
  <div>
    <h2>Text-Link & Icon-Button</h2>
    <div class="row">
      <a class="k-link" href="#">Mehr zur Partnerschaft
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"></path></svg>
      </a>
      <button class="k-icon-btn" aria-label="Dunkles Design">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"></path></svg>
      </button>
    </div>
  </div>
  <div>
    <h2>Chips — Glas-Badge & Filter</h2>
    <div class="row">
      <span class="k-chip"><strong>ISO 9001 · 14001 · 50001</strong>&nbsp;zertifiziert</span>
      <button class="k-filter-chip is-on" aria-pressed="true">Alle (27)</button>
      <button class="k-filter-chip" aria-pressed="false">Naher &amp; Mittlerer Osten (12)</button>
      <button class="k-filter-chip" aria-pressed="false">DACH (6)</button>
    </div>
  </div>
</div>
</body>
</html>
